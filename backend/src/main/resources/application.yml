server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/novel_reader;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}
  expiration: 604800

app:
  admin:
    init:
      enabled: ${ADMIN_INIT_ENABLED:true}
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123456}
    email: ${ADMIN_EMAIL:admin@local}
