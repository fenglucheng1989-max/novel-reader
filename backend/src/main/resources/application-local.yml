spring:
  datasource:
    url: jdbc:h2:mem:novel_reader;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true

jwt:
  secret: local-development-secret-key-at-least-32-bytes

server:
  port: 8081
